---
name: "Deploy Terraform HomeTest App"
run-name: "Deploy env: ${{ inputs.environment || 'poc' }}, subenv: ${{ inputs.subenv || 'dev' }}, tf: ${{ inputs.action || 'plan' }}"

on:
  workflow_dispatch:
    inputs:
      hometest_service_ref:
        description: "Branch, tag, or SHA to checkout for hometest-service"
        required: false
        default: "main"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - poc
        default: poc
      subenv:
        description: "Terraform subenv to deploy"
        required: true
        type: choice
        default: dev
        options:
          - dev
          # - dev-example
          - uat
      action:
        description: "Terraform action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
          # - destroy-plan
        default: plan

env:
  AWS_REGION: "eu-west-2"
  TF_INPUT: false
  TF_IN_AUTOMATION: true

jobs:
  validate-inputs:
    name: "Validate inputs"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      subenvs: ${{ steps.set-subenvs.outputs.subenvs }}
      working_dir_base: ${{ steps.set-subenvs.outputs.working_dir_base }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Checkout hometest-service"
        uses: actions/checkout@v6
        with:
          repository: "NHSDigital/hometest-service"
          ref: ${{ inputs.hometest_service_ref || 'main' }}
          path: hometest-service
          ssh-key: ${{ secrets.NHS_HOMETEST_SERVICE_DEPLOY_KEY_SSH_PRIV }}

      - name: "Set subenvs to deploy"
        id: set-subenvs
        run: |
          WORKING_DIR_BASE="hometest-mgmt-terraform/infrastructure/environments/${{ inputs.environment || 'poc' }}/hometest-app"
          echo "working_dir_base=${WORKING_DIR_BASE}" >> "$GITHUB_OUTPUT"
          echo "subenvs=[\"${{ inputs.subenv || 'dev' }}\"]" >> "$GITHUB_OUTPUT"

      - name: "Validate subenv path exists"
        run: |
          BASE_PATH="hometest-mgmt-terraform/infrastructure/environments/${{ inputs.environment || 'poc' }}/hometest-app"
          if [ "${{ inputs.subenv || 'dev' }}" != "all" ]; then
            if [ ! -d "${BASE_PATH}/${{ inputs.subenv || 'dev' }}" ]; then
              echo "::error::subenv path '${BASE_PATH}/${{ inputs.subenv || 'dev' }}' does not exist"
              exit 1
            fi
          fi

      - name: "Display deployment info"
        run: |
          HS_COMMIT=$(git -C hometest-service rev-parse HEAD)
          HS_COMMIT_SHORT=$(git -C hometest-service rev-parse --short HEAD)
          {
            echo "## Deployment Configuration"
            echo "| Parameter | Value |"
            echo "|-----------|---------|"
            echo "| Environment | ${{ inputs.environment || 'poc' }} |"
            echo "| Stack | hometest-app |"
            echo "| Subenv(s) | ${{ inputs.subenv || 'dev' }} |"
            echo "| Action | ${{ inputs.action || 'plan' }} |"
            echo "| Triggered by | ${{ github.actor }} |"
            echo "| hometest-service ref | \`${{ inputs.hometest_service_ref || 'main' }}\` |"
            echo "| hometest-service commit | \`${HS_COMMIT_SHORT}\` (${HS_COMMIT}) |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # DEPLOY PATH (plan / apply): migrate first → then deploy app
  # ---------------------------------------------------------------------------

  deploy-migrator:
    name: "Migrate DB ${{ matrix.subenv }}"
    if: inputs.action != 'destroy'
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        subenv: ${{ fromJson(needs.validate-inputs.outputs.subenvs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/lambda-goose-migrator

      - name: "Deploy goose migrator (${{ matrix.subenv }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/lambda-goose-migrator
          action: ${{ inputs.action || 'plan' }}

      - name: "Configure AWS credentials for Lambda invocation"
        if: inputs.action == 'apply'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Invoke goose migrator to run migrations"
        if: inputs.action == 'apply'
        run: |
          WORKING_DIR="${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/lambda-goose-migrator"

          # Get function name from terraform output
          FUNCTION_NAME=$(cd "$WORKING_DIR" && mise exec -- terragrunt output -raw function_name 2>/dev/null || echo "")

          if [ -z "$FUNCTION_NAME" ] || [ "$FUNCTION_NAME" == "None" ]; then
            echo "::error::Could not determine Lambda function name from terraform outputs"
            exit 1
          fi

          echo "Invoking Lambda: ${FUNCTION_NAME}"
          LOG_GROUP="/aws/lambda/${FUNCTION_NAME}"
          START_TIME_MS=$(date +%s%3N)

          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --invocation-type RequestResponse \
            --log-type Tail \
            --cli-read-timeout 0 \
            --payload '{"action":"migrate"}' \
            /tmp/lambda-response.json > /tmp/lambda-invoke-meta.json

          STATUS_CODE=$(jq -r '.StatusCode // empty' /tmp/lambda-invoke-meta.json)
          FUNCTION_ERROR=$(jq -r '.FunctionError // empty' /tmp/lambda-invoke-meta.json)
          LOG_RESULT_B64=$(jq -r '.LogResult // empty' /tmp/lambda-invoke-meta.json)

          echo "Status code: ${STATUS_CODE}"

          LOG_TAIL=""
          REQUEST_ID=""
          if [ -n "$LOG_RESULT_B64" ]; then
            LOG_TAIL=$(echo "$LOG_RESULT_B64" | base64 -d)
            REQUEST_ID=$(echo "$LOG_TAIL" | grep -oP 'START RequestId: \K[a-f0-9-]+' || true)
          fi
          echo "Request ID: ${REQUEST_ID}"

          # Fetch CloudWatch logs
          LOGS=""
          if [ -n "$REQUEST_ID" ]; then
            echo "Waiting for CloudWatch to ingest logs..."
            sleep 10
            MAX_WAIT=120; ELAPSED=0; INTERVAL=5; LOG_STREAM=""
            while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
              FILTER_RESULT=$(aws logs filter-log-events \
                --log-group-name "$LOG_GROUP" \
                --filter-pattern "\"END RequestId: ${REQUEST_ID}\"" \
                --start-time "$START_TIME_MS" \
                --query "events[0]" --output json 2>/dev/null || echo "null")
              LOG_STREAM=$(echo "$FILTER_RESULT" | jq -r '.logStreamName // empty')
              if [ -n "$LOG_STREAM" ]; then break; fi
              echo "  Waiting for END marker... (${ELAPSED}s elapsed)"
              sleep "$INTERVAL"; ELAPSED=$(( ELAPSED + INTERVAL ))
            done

            if [ -n "$LOG_STREAM" ]; then
              LOGS=$(aws logs get-log-events \
                --log-group-name "$LOG_GROUP" --log-stream-name "$LOG_STREAM" \
                --start-time "$START_TIME_MS" --start-from-head \
                --query "events[*].message" --output text 2>/dev/null || true)
            fi
          fi

          echo "=== Migration Logs ==="
          if [ -n "$LOGS" ]; then
            echo "$LOGS"
            {
              echo "### Migration Logs (${{ matrix.subenv }})"
              echo "**Function**: \`${FUNCTION_NAME}\`"
              echo "**Request ID**: \`${REQUEST_ID}\`"
              echo '```'; echo "$LOGS"; echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "$LOG_TAIL"
            {
              echo "### Migration Logs (${{ matrix.subenv }}, tail)"
              echo "**Function**: \`${FUNCTION_NAME}\`"
              echo '```'; echo "$LOG_TAIL"; echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$FUNCTION_ERROR" ] && [ "$FUNCTION_ERROR" != "null" ]; then
            echo "::error::Lambda migration error: ${FUNCTION_ERROR}"
            cat /tmp/lambda-response.json
            exit 1
          fi

      - name: "Post migration summary"
        if: always()
        run: |
          {
            echo "## Migrate DB: ${{ matrix.subenv }}"
            echo "- **Status**: ${{ job.status }}"
            echo "- **Action**: ${{ inputs.action || 'plan' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-app:
    name: "Deploy App ${{ matrix.subenv }}"
    if: inputs.action != 'destroy'
    runs-on: ubuntu-latest
    needs: [validate-inputs, deploy-migrator]
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        subenv: ${{ fromJson(needs.validate-inputs.outputs.subenvs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Checkout hometest-service"
        uses: actions/checkout@v6
        with:
          repository: "NHSDigital/hometest-service"
          ref: ${{ inputs.hometest_service_ref || 'main' }}
          path: hometest-service
          ssh-key: ${{ secrets.NHS_HOMETEST_SERVICE_DEPLOY_KEY_SSH_PRIV }}

      - name: "Cache node_modules"
        uses: actions/cache@v5
        with:
          path: |
            hometest-service/node_modules
            hometest-service/ui/node_modules
            hometest-service/lambdas/node_modules
            hometest-service/tests/node_modules
          key: node-modules-${{ runner.os }}-mgmt-${{ github.event_name == 'pull_request' && 'pr' || 'push' }}-${{ hashFiles('hometest-service/**/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-mgmt-${{ github.event_name == 'pull_request' && 'pr' || 'push' }}-
            node-modules-${{ runner.os }}-mgmt-
            node-modules-${{ runner.os }}-

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}

      - name: "Deploy app (${{ matrix.subenv }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}
          action: ${{ inputs.action || 'plan' }}

      - name: "Post deployment summary"
        if: always()
        run: |
          {
            echo "## Deploy App: ${{ matrix.subenv }}"
            echo "- **Status**: ${{ job.status }}"
            echo "- **Action**: ${{ inputs.action || 'plan' }}"
            echo "- **Path**: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # DESTROY PATH: destroy app → teardown schema → destroy migrator infra
  # ---------------------------------------------------------------------------

  destroy-app:
    name: "Destroy App ${{ matrix.subenv }}"
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        subenv: ${{ fromJson(needs.validate-inputs.outputs.subenvs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Checkout hometest-service"
        uses: actions/checkout@v6
        with:
          repository: "NHSDigital/hometest-service"
          ref: ${{ inputs.hometest_service_ref || 'main' }}
          path: hometest-service
          ssh-key: ${{ secrets.NHS_HOMETEST_SERVICE_DEPLOY_KEY_SSH_PRIV }}

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}

      - name: "Destroy app (${{ matrix.subenv }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}
          action: destroy

      - name: "Post destroy summary"
        if: always()
        run: |
          {
            echo "## Destroy App: ${{ matrix.subenv }}"
            echo "- **Status**: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  teardown-schema:
    name: "Teardown Schema ${{ matrix.subenv }}"
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    needs: [validate-inputs, destroy-app]
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        subenv: ${{ fromJson(needs.validate-inputs.outputs.subenvs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/lambda-goose-migrator

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Invoke teardown to drop schema and user"
        run: |
          WORKING_DIR="${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/lambda-goose-migrator"

          # Get function name from terraform output
          FUNCTION_NAME=$(cd "$WORKING_DIR" && mise exec -- terragrunt output -raw function_name 2>/dev/null || echo "")

          if [ -z "$FUNCTION_NAME" ] || [ "$FUNCTION_NAME" == "None" ]; then
            echo "::warning::Could not determine Lambda function name — migrator may already be destroyed. Skipping teardown."
            exit 0
          fi

          echo "Invoking teardown on Lambda: ${FUNCTION_NAME}"
          LOG_GROUP="/aws/lambda/${FUNCTION_NAME}"
          START_TIME_MS=$(date +%s%3N)

          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --invocation-type RequestResponse \
            --log-type Tail \
            --cli-read-timeout 0 \
            --payload '{"action":"teardown"}' \
            /tmp/lambda-response.json > /tmp/lambda-invoke-meta.json

          STATUS_CODE=$(jq -r '.StatusCode // empty' /tmp/lambda-invoke-meta.json)
          FUNCTION_ERROR=$(jq -r '.FunctionError // empty' /tmp/lambda-invoke-meta.json)
          LOG_RESULT_B64=$(jq -r '.LogResult // empty' /tmp/lambda-invoke-meta.json)

          echo "Status code: ${STATUS_CODE}"

          LOG_TAIL=""
          REQUEST_ID=""
          if [ -n "$LOG_RESULT_B64" ]; then
            LOG_TAIL=$(echo "$LOG_RESULT_B64" | base64 -d)
            REQUEST_ID=$(echo "$LOG_TAIL" | grep -oP 'START RequestId: \K[a-f0-9-]+' || true)
          fi

          # Fetch CloudWatch logs
          LOGS=""
          if [ -n "$REQUEST_ID" ]; then
            sleep 10
            MAX_WAIT=120; ELAPSED=0; INTERVAL=5; LOG_STREAM=""
            while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
              FILTER_RESULT=$(aws logs filter-log-events \
                --log-group-name "$LOG_GROUP" \
                --filter-pattern "\"END RequestId: ${REQUEST_ID}\"" \
                --start-time "$START_TIME_MS" \
                --query "events[0]" --output json 2>/dev/null || echo "null")
              LOG_STREAM=$(echo "$FILTER_RESULT" | jq -r '.logStreamName // empty')
              if [ -n "$LOG_STREAM" ]; then break; fi
              sleep "$INTERVAL"; ELAPSED=$(( ELAPSED + INTERVAL ))
            done

            if [ -n "$LOG_STREAM" ]; then
              LOGS=$(aws logs get-log-events \
                --log-group-name "$LOG_GROUP" --log-stream-name "$LOG_STREAM" \
                --start-time "$START_TIME_MS" --start-from-head \
                --query "events[*].message" --output text 2>/dev/null || true)
            fi
          fi

          echo "=== Teardown Logs ==="
          if [ -n "$LOGS" ]; then
            echo "$LOGS"
            {
              echo "### Teardown Logs (${{ matrix.subenv }})"
              echo "**Function**: \`${FUNCTION_NAME}\`"
              echo '```'; echo "$LOGS"; echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "$LOG_TAIL"
          fi

          if [ -n "$FUNCTION_ERROR" ] && [ "$FUNCTION_ERROR" != "null" ]; then
            echo "::error::Lambda teardown error: ${FUNCTION_ERROR}"
            cat /tmp/lambda-response.json
            exit 1
          fi

      - name: "Post teardown summary"
        if: always()
        run: |
          {
            echo "## Teardown Schema: ${{ matrix.subenv }}"
            echo "- **Status**: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  destroy-migrator:
    name: "Destroy Migrator ${{ matrix.subenv }}"
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    needs: [validate-inputs, teardown-schema]
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        subenv: ${{ fromJson(needs.validate-inputs.outputs.subenvs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/lambda-goose-migrator

      - name: "Destroy goose migrator (${{ matrix.subenv }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/lambda-goose-migrator
          action: destroy

      - name: "Post destroy migrator summary"
        if: always()
        run: |
          {
            echo "## Destroy Migrator: ${{ matrix.subenv }}"
            echo "- **Status**: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # SUMMARY
  # ---------------------------------------------------------------------------

  summary:
    name: "Deployment Summary"
    runs-on: ubuntu-latest
    needs: [validate-inputs, deploy-migrator, deploy-app, destroy-app, teardown-schema, destroy-migrator]
    if: always()
    steps:
      - name: "Generate summary"
        run: |
          {
            echo "## Deployment Complete"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| Environment | ${{ inputs.environment || 'poc' }} |"
            echo "| Stack | hometest-app |"
            echo "| Subenv(s) | ${{ inputs.subenv || 'dev' }} |"
            echo "| Action | ${{ inputs.action || 'plan' }} |"
            echo "| Overall Status | see individual jobs |"
            echo "| Run ID | ${{ github.run_id }} |"
            echo "| Triggered by | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"
