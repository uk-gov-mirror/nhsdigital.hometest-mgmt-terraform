---
name: "Deploy Terraform HomeTest App"
run-name: "Deploy env: ${{ inputs.environment || 'poc' }}, subenv: ${{ inputs.subenv || 'dev' }}, tf: ${{ inputs.action || 'plan' }}"

on:
  workflow_dispatch:
    inputs:
      hometest_service_ref:
        description: "Branch, tag, or SHA to checkout for hometest-service"
        required: false
        default: "main"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - poc
          - dev
        default: poc
      subenv:
        description: "Terraform subenv to deploy"
        required: true
        type: choice
        default: dev
        options:
          # - dev-example
          - dev
          - uat
          - demo
          - staging
      action:
        description: "Terraform action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
          # - destroy-plan
        default: plan
      targets:
        description: "Comma-separated list of resources to target in the app stack only (e.g., module.lambdas[\"order-status-lambda\"]). Does not apply to migrator. Leave empty for full deployment."
        required: false
        type: string
        default: ""
      skip_migrator:
        description: "Skip the goose migrator deployment entirely (deploy app stack only). Equivalent to SKIP_MIGRATOR=true locally."
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: "eu-west-2"
  TF_INPUT: false
  TF_IN_AUTOMATION: true

jobs:
  validate-inputs:
    name: "Validate inputs"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      subenvs: ${{ steps.set-subenvs.outputs.subenvs }}
      working_dir_base: ${{ steps.set-subenvs.outputs.working_dir_base }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Checkout hometest-service"
        uses: actions/checkout@v6
        with:
          repository: "NHSDigital/hometest-service"
          ref: ${{ inputs.hometest_service_ref || 'main' }}
          path: hometest-service
          ssh-key: ${{ secrets.NHS_HOMETEST_SERVICE_DEPLOY_KEY_SSH_PRIV }}

      - name: "Set subenvs to deploy"
        id: set-subenvs
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment || 'poc' }}
          INPUT_SUBENV: ${{ inputs.subenv || 'dev' }}
        run: |
          WORKING_DIR_BASE="hometest-mgmt-terraform/infrastructure/environments/${INPUT_ENVIRONMENT}/hometest-app"
          echo "working_dir_base=${WORKING_DIR_BASE}" >> "$GITHUB_OUTPUT"
          echo "subenvs=[\"${INPUT_SUBENV}\"]" >> "$GITHUB_OUTPUT"

      - name: "Validate subenv path exists"
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment || 'poc' }}
          INPUT_SUBENV: ${{ inputs.subenv || 'dev' }}
        run: |
          BASE_PATH="hometest-mgmt-terraform/infrastructure/environments/${INPUT_ENVIRONMENT}/hometest-app"
          if [ "${INPUT_SUBENV}" != "all" ]; then
            if [ ! -d "${BASE_PATH}/${INPUT_SUBENV}" ]; then
              echo "::error::subenv path '${BASE_PATH}/${INPUT_SUBENV}' does not exist"
              exit 1
            fi
          fi

      - name: "Display deployment info"
        uses: ./hometest-mgmt-terraform/.github/actions/display-deployment-info
        with:
          hometest_service_path: hometest-service
          hometest_service_ref: ${{ inputs.hometest_service_ref || 'main' }}
          extra_rows: |
            | Environment | ${{ inputs.environment || 'poc' }} |
            | Stack | hometest-app |
            | Subenv(s) | ${{ inputs.subenv || 'dev' }} |
            | Action | ${{ inputs.action || 'plan' }} |
            | Targets | ${{ inputs.targets || 'all resources' }} |
            | Skip Migrator | ${{ inputs.skip_migrator || 'false' }} |

  # ---------------------------------------------------------------------------
  # DEPLOY PATH (plan / apply): deploy migrator (hooks auto-invoke) → deploy app
  # The Terragrunt after_hook on apply automatically invokes the Lambda to run
  # migrations — no separate invocation step needed.
  # ---------------------------------------------------------------------------

  deploy-migrator:
    name: "Migrate DB ${{ matrix.subenv }}"
    if: inputs.action != 'destroy' && inputs.skip_migrator != true
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    environment: ${{ inputs.environment || 'poc' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        subenv: ${{ fromJson(needs.validate-inputs.outputs.subenvs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/lambda-goose-migrator

      - name: "Deploy goose migrator (${{ matrix.subenv }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/lambda-goose-migrator
          action: ${{ inputs.action || 'plan' }}

      - name: "Post migration summary"
        if: always()
        env:
          SUBENV: ${{ matrix.subenv }}
          INPUT_ACTION: ${{ inputs.action || 'plan' }}
        run: |
          {
            echo "## Migrate DB: ${SUBENV}"
            echo "- **Status**: ${{ job.status }}"
            echo "- **Action**: ${INPUT_ACTION}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-app:
    name: "Deploy App ${{ matrix.subenv }}"
    if: "!cancelled() && needs.validate-inputs.result == 'success' && inputs.action != 'destroy' && (needs.deploy-migrator.result == 'success' || inputs.skip_migrator == true)"
    runs-on: ubuntu-latest
    needs: [validate-inputs, deploy-migrator]
    environment: ${{ inputs.environment || 'poc' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        subenv: ${{ fromJson(needs.validate-inputs.outputs.subenvs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Checkout hometest-service"
        uses: actions/checkout@v6
        with:
          repository: "NHSDigital/hometest-service"
          ref: ${{ inputs.hometest_service_ref || 'main' }}
          path: hometest-service
          ssh-key: ${{ secrets.NHS_HOMETEST_SERVICE_DEPLOY_KEY_SSH_PRIV }}

      - name: "Restore mise hometest-service cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/share/mise
            hometest-service/.mise-cache
          key: mise-hometest-service-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/.mise.toml') }}
          restore-keys: |
            mise-hometest-service-${{ runner.os }}-mgmt-
            mise-hometest-service-${{ runner.os }}-

      - name: "Restore node_modules cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            hometest-service/node_modules
            hometest-service/ui/node_modules
            hometest-service/lambdas/node_modules
            hometest-service/tests/node_modules
          key: node-modules-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/**/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-mgmt-
            node-modules-${{ runner.os }}-

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/app

      - name: "Deploy app (${{ matrix.subenv }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/app
          action: ${{ inputs.action || 'plan' }}
          targets: ${{ inputs.targets }}

      - name: "Save mise hometest-service cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.local/share/mise
            hometest-service/.mise-cache
          key: mise-hometest-service-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/.mise.toml') }}

      - name: "Save node_modules cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            hometest-service/node_modules
            hometest-service/ui/node_modules
            hometest-service/lambdas/node_modules
            hometest-service/tests/node_modules
          key: node-modules-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/**/package-lock.json') }}

      - name: "Post deployment summary"
        if: always()
        env:
          SUBENV: ${{ matrix.subenv }}
          INPUT_ACTION: ${{ inputs.action || 'plan' }}
          WORKING_DIR_BASE: ${{ needs.validate-inputs.outputs.working_dir_base }}
        run: |
          {
            echo "## Deploy App: ${SUBENV}"
            echo "- **Status**: ${{ job.status }}"
            echo "- **Action**: ${INPUT_ACTION}"
            echo "- **Path**: ${WORKING_DIR_BASE}/${SUBENV}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # DESTROY PATH: destroy app → destroy migrator (before_hook auto-teardowns schema)
  # The Terragrunt before_hook on destroy automatically invokes the Lambda to
  # teardown the schema/user before destroying the migrator infrastructure.
  # ---------------------------------------------------------------------------

  destroy-app:
    name: "Destroy App ${{ matrix.subenv }}"
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    environment: ${{ inputs.environment || 'poc' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        subenv: ${{ fromJson(needs.validate-inputs.outputs.subenvs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Checkout hometest-service"
        uses: actions/checkout@v6
        with:
          repository: "NHSDigital/hometest-service"
          ref: ${{ inputs.hometest_service_ref || 'main' }}
          path: hometest-service
          ssh-key: ${{ secrets.NHS_HOMETEST_SERVICE_DEPLOY_KEY_SSH_PRIV }}

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/app

      - name: "Destroy app (${{ matrix.subenv }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/app
          action: destroy
          targets: ${{ inputs.targets }}

      - name: "Post destroy summary"
        if: always()
        env:
          SUBENV: ${{ matrix.subenv }}
        run: |
          {
            echo "## Destroy App: ${SUBENV}"
            echo "- **Status**: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  destroy-migrator:
    name: "Destroy Migrator ${{ matrix.subenv }}"
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    needs: [validate-inputs, destroy-app]
    environment: ${{ inputs.environment || 'poc' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        subenv: ${{ fromJson(needs.validate-inputs.outputs.subenvs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/lambda-goose-migrator

      - name: "Destroy goose migrator (${{ matrix.subenv }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.subenv }}/lambda-goose-migrator
          action: destroy

      - name: "Post destroy migrator summary"
        if: always()
        env:
          SUBENV: ${{ matrix.subenv }}
        run: |
          {
            echo "## Destroy Migrator: ${SUBENV}"
            echo "- **Status**: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # SUMMARY
  # ---------------------------------------------------------------------------

  summary:
    name: "Deployment Summary"
    runs-on: ubuntu-latest
    needs: [validate-inputs, deploy-migrator, deploy-app, destroy-app, destroy-migrator]
    if: always()
    steps:
      - name: "Generate summary"
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment || 'poc' }}
          INPUT_SUBENV: ${{ inputs.subenv || 'dev' }}
          INPUT_ACTION: ${{ inputs.action || 'plan' }}
          INPUT_TARGETS: ${{ inputs.targets || 'all resources' }}
          INPUT_SKIP_MIGRATOR: ${{ inputs.skip_migrator || 'false' }}
        run: |
          {
            echo "## Deployment Complete"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| Environment | ${INPUT_ENVIRONMENT} |"
            echo "| Stack | hometest-app |"
            echo "| Subenv(s) | ${INPUT_SUBENV} |"
            echo "| Action | ${INPUT_ACTION} |"
            echo "| Targets | ${INPUT_TARGETS} |"
            echo "| Skip Migrator | ${INPUT_SKIP_MIGRATOR} |"
            echo "| Overall Status | see individual jobs |"
            echo "| Run ID | ${GITHUB_RUN_ID} |"
            echo "| Triggered by | ${GITHUB_ACTOR} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Determine overall status"
        id: status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "result=cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

      - name: "Notify Slack on failure"
        if: inputs.action != 'plan' && steps.status.outputs.result == 'failure'
        uses: ./hometest-mgmt-terraform/.github/actions/notify-slack
        with:
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure
          environment: "${{ inputs.environment || 'poc' }}/${{ inputs.subenv || 'dev' }}"
          module: "hometest-app (${{ inputs.action || 'plan' }})"
