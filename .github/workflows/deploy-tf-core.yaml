---
name: "Deploy Terraform Core"
run-name: "Deploy account: ${{ inputs.account || 'poc' }}, module: ${{ inputs.module || 'all' }}, tf: ${{ inputs.action || 'plan' }}"

on:
  workflow_dispatch:
    inputs:
      account:
        description: "Target AWS account"
        required: true
        type: choice
        options:
          - poc
          - dev
        default: poc
      module:
        description: "Terraform module to deploy"
        required: true
        type: choice
        default: bootstrap
        options:
          - bootstrap
          - network
          - shared_services
          - aurora-postgres
          - ecs
          - all
      action:
        description: "Terraform action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          # - destroy-plan
          - destroy
        default: plan

env:
  AWS_REGION: "eu-west-2"
  TF_INPUT: false
  TF_IN_AUTOMATION: true

jobs:
  validate-inputs:
    name: "Validate inputs"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
      working_dir_base: ${{ steps.set-modules.outputs.working_dir_base }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Set modules to deploy"
        id: set-modules
        env:
          INPUT_ACCOUNT: ${{ inputs.account || 'poc' }}
          INPUT_MODULE: ${{ inputs.module || 'all' }}
        run: |
          WORKING_DIR_BASE="hometest-mgmt-terraform/infrastructure/environments/${INPUT_ACCOUNT}/core"
          echo "working_dir_base=${WORKING_DIR_BASE}" >> "$GITHUB_OUTPUT"

          if [ "${INPUT_MODULE}" == "all" ]; then
            # Deploy in dependency order
            echo 'modules=["bootstrap", "network", "aurora-postgres", "shared_services", "ecs"]' >> "$GITHUB_OUTPUT"
          else
            echo "modules=[\"${INPUT_MODULE}\"]" >> "$GITHUB_OUTPUT"
          fi

      - name: "Validate module path exists"
        env:
          INPUT_ACCOUNT: ${{ inputs.account || 'poc' }}
          INPUT_MODULE: ${{ inputs.module || 'all' }}
        run: |
          BASE_PATH="hometest-mgmt-terraform/infrastructure/environments/${INPUT_ACCOUNT}/core"
          if [ "${INPUT_MODULE}" != "all" ]; then
            if [ ! -d "${BASE_PATH}/${INPUT_MODULE}" ]; then
              echo "::error::Module path '${BASE_PATH}/${INPUT_MODULE}' does not exist"
              exit 1
            fi
          fi

      - name: "Display deployment info"
        uses: ./hometest-mgmt-terraform/.github/actions/display-deployment-info
        with:
          extra_rows: |
            | Account | ${{ inputs.account || 'poc' }} |
            | Stack | core |
            | Module(s) | ${{ inputs.module || 'all' }} |
            | Action | ${{ inputs.action || 'plan' }} |

  deploy:
    name: "Deploy ${{ matrix.module }}"
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    environment: ${{ inputs.account || 'poc' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1  # Sequential deployment to respect dependencies
      matrix:
        module: ${{ fromJson(needs.validate-inputs.outputs.modules) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.module }}

      - name: "Deploy ${{ matrix.module }}"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.module }}
          action: ${{ inputs.action || 'plan' }}

      - name: "Post deployment summary"
        if: always()
        env:
          MODULE: ${{ matrix.module }}
          INPUT_ACTION: ${{ inputs.action || 'plan' }}
          WORKING_DIR_BASE: ${{ needs.validate-inputs.outputs.working_dir_base }}
        run: |
          {
            echo "## Module: ${MODULE}"
            echo "- **Status**: ${{ job.status }}"
            echo "- **Action**: ${INPUT_ACTION}"
            echo "- **Path**: ${WORKING_DIR_BASE}/${MODULE}"
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: "Deployment Summary"
    runs-on: ubuntu-latest
    needs: [validate-inputs, deploy]
    if: always()
    steps:
      - name: "Generate summary"
        env:
          INPUT_ACCOUNT: ${{ inputs.account || 'poc' }}
          INPUT_MODULE: ${{ inputs.module || 'all' }}
          INPUT_ACTION: ${{ inputs.action || 'plan' }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          {
            echo "## Deployment Complete"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| Account | ${INPUT_ACCOUNT} |"
            echo "| Stack | core |"
            echo "| Module(s) | ${INPUT_MODULE} |"
            echo "| Action | ${INPUT_ACTION} |"
            echo "| Overall Status | ${DEPLOY_RESULT} |"
            echo "| Run ID | ${GITHUB_RUN_ID} |"
            echo "| Triggered by | ${GITHUB_ACTOR} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Checkout code"
        if: contains(needs.*.result, 'failure')
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Notify Slack on failure"
        if: contains(needs.*.result, 'failure')
        uses: ./hometest-mgmt-terraform/.github/actions/notify-slack
        with:
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure
          environment: ${{ inputs.account || 'poc' }}
          module: "core/${{ inputs.module || 'all' }} (${{ inputs.action || 'plan' }})"
