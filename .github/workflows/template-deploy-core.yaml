---
name: "CI/CD deploy core"
run-name: "Deploy core to account: ${{ inputs.account || 'poc' }}, tf: apply"

on:
  workflow_call:
    inputs:
      account:
        description: "Target AWS account (poc or dev)"
        required: true
        type: string
      deploy_ecs:
        description: "Whether to deploy the ECS component (poc only)"
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ROLE_ARN:
        required: true
      SLACK_WEBHOOK_URL:
        required: false

env:
  AWS_REGION: "eu-west-2"

jobs:
  metadata:
    name: "Set CI/CD metadata"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      build_datetime: ${{ steps.variables.outputs.build_datetime }}
      build_timestamp: ${{ steps.variables.outputs.build_timestamp }}
      build_epoch: ${{ steps.variables.outputs.build_epoch }}
      nodejs_version: ${{ steps.variables.outputs.nodejs_version }}
      python_version: ${{ steps.variables.outputs.python_version }}
      terraform_version: ${{ steps.variables.outputs.terraform_version }}
      version: ${{ steps.variables.outputs.version }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set CI/CD variables"
        id: variables
        run: |
          datetime=$(date -u +'%Y-%m-%dT%H:%M:%S%z')
          {
            echo "build_datetime=$datetime"
            echo "build_timestamp=$(date --date="$datetime" -u +'%Y%m%d%H%M%S')"
            echo "build_epoch=$(date --date="$datetime" -u +'%s')"
            echo "nodejs_version=$(grep "^nodejs\s" .tool-versions | cut -f2 -d' ')"
            echo "python_version=$(grep "^python\s" .tool-versions | cut -f2 -d' ')"
            echo "terraform_version=$(grep "^terraform\s" .tool-versions | cut -f2 -d' ')"
            # TODO: Get the version, but it may not be the .version file as this should come from the CI/CD Pull Request Workflow
            echo "version=$(head -n 1 .version 2> /dev/null || echo unknown)"
          } >> "$GITHUB_OUTPUT"
      - name: "List variables"
        env:
          BUILD_DATETIME: ${{ steps.variables.outputs.build_datetime }}
          BUILD_TIMESTAMP: ${{ steps.variables.outputs.build_timestamp }}
          BUILD_EPOCH: ${{ steps.variables.outputs.build_epoch }}
          NODEJS_VERSION: ${{ steps.variables.outputs.nodejs_version }}
          PYTHON_VERSION: ${{ steps.variables.outputs.python_version }}
          TERRAFORM_VERSION: ${{ steps.variables.outputs.terraform_version }}
          VERSION: ${{ steps.variables.outputs.version }}
        run: |
          export BUILD_DATETIME
          export BUILD_TIMESTAMP
          export BUILD_EPOCH
          export NODEJS_VERSION
          export PYTHON_VERSION
          export TERRAFORM_VERSION
          export VERSION
          make list-variables

      - name: "Display deployment info"
        uses: ./.github/actions/display-deployment-info
        with:
          mgmt_terraform_path: "."
          extra_rows: |
            | Account | ${{ inputs.account || 'poc' }} |
            | Action | apply |

  deploy-bootstrap:
    name: "Deploy TF Core/Bootstrap"
    runs-on: ubuntu-latest
    needs: [metadata]
    environment: ${{ inputs.account || 'poc' }}
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ./hometest-mgmt-terraform/infrastructure/environments/${{ inputs.account || 'poc' }}/core/bootstrap
    permissions:
      id-token: write    # REQUIRED for OIDC token
      contents: read     # For checkout
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ env.DEPLOY_PATH }}

      - name: Deploy TF Core/Bootstrap
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          working_directory: ${{ env.DEPLOY_PATH }}

  deploy-network:
    name: "Deploy TF Core/Network"
    runs-on: ubuntu-latest
    needs: [deploy-bootstrap]
    environment: ${{ inputs.account || 'poc' }}
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ./hometest-mgmt-terraform/infrastructure/environments/${{ inputs.account || 'poc' }}/core/network
    permissions:
      id-token: write    # REQUIRED for OIDC token
      contents: read     # For checkout
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ env.DEPLOY_PATH }}

      - name: Deploy TF Core/Network
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          working_directory: ${{ env.DEPLOY_PATH }}

  deploy-shared-services:
    name: "Deploy TF Core/shared_services"
    runs-on: ubuntu-latest
    needs: [deploy-network]
    environment: ${{ inputs.account || 'poc' }}
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ./hometest-mgmt-terraform/infrastructure/environments/${{ inputs.account || 'poc' }}/core/shared_services
    permissions:
      id-token: write    # REQUIRED for OIDC token
      contents: read     # For checkout
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ env.DEPLOY_PATH }}

      - name: Deploy TF Core/shared_services
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          working_directory: ${{ env.DEPLOY_PATH }}

  deploy-aurora:
    name: "Deploy TF Core/aurora-postgres"
    runs-on: ubuntu-latest
    needs: [deploy-shared-services]
    environment: ${{ inputs.account || 'poc' }}
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ./hometest-mgmt-terraform/infrastructure/environments/${{ inputs.account || 'poc' }}/core/aurora-postgres
    permissions:
      id-token: write    # REQUIRED for OIDC token
      contents: read     # For checkout
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ env.DEPLOY_PATH }}

      - name: Deploy TF Core/aurora-postgres
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          working_directory: ${{ env.DEPLOY_PATH }}

  deploy-ecs:
    name: "Deploy TF Core/ECS"
    runs-on: ubuntu-latest
    needs: [deploy-aurora]
    if: ${{ inputs.deploy_ecs }}
    environment: ${{ inputs.account || 'poc' }}
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ./hometest-mgmt-terraform/infrastructure/environments/${{ inputs.account }}/core/ecs
    permissions:
      id-token: write    # REQUIRED for OIDC token
      contents: read     # For checkout
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ env.DEPLOY_PATH }}

      - name: Deploy TF Core/ECS
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          working_directory: ${{ env.DEPLOY_PATH }}

