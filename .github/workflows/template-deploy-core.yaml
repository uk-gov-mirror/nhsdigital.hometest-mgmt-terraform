  notify-slack:
    name: "Slack Deployment Notification"
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy-bootstrap, deploy-network, deploy-shared-services, deploy-aurora, deploy-ecs]
    timeout-minutes: 2
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Determine overall status"
        id: status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "result=cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

      - name: "Notify Slack on failure"
        if: steps.status.outputs.result == 'failure'
        uses: ./hometest-mgmt-terraform/.github/actions/notify-slack
        with:
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure
          environment: ${{ inputs.account || 'poc' }}
          module: "hometest-mgmt-terraform"
