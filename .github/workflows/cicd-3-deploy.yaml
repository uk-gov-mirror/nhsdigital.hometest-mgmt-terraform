---
name: "CI/CD deploy"
run-name: "Deploy hometest-mgmt-terraform to env: ${{ inputs.environment || 'poc' }}, tf: apply"

on:
  push:
    branches:
      - main
  schedule:
    # Nightly redeploy of hometest-app/dev at 06:00 UTC (Mon-Fri)
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: poc
        options:
          - poc
          - dev
      # hometest_service_ref:
      #   description: "Branch, tag, or SHA to checkout for hometest-service"
      #   required: false
      #   default: "main"

env:
  AWS_REGION: "eu-west-2"

jobs:
  metadata:
    name: "Set CI/CD metadata"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      build_datetime: ${{ steps.variables.outputs.build_datetime }}
      build_timestamp: ${{ steps.variables.outputs.build_timestamp }}
      build_epoch: ${{ steps.variables.outputs.build_epoch }}
      nodejs_version: ${{ steps.variables.outputs.nodejs_version }}
      python_version: ${{ steps.variables.outputs.python_version }}
      terraform_version: ${{ steps.variables.outputs.terraform_version }}
      version: ${{ steps.variables.outputs.version }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set CI/CD variables"
        id: variables
        run: |
          datetime=$(date -u +'%Y-%m-%dT%H:%M:%S%z')
          {
            echo "build_datetime=$datetime"
            echo "build_timestamp=$(date --date="$datetime" -u +'%Y%m%d%H%M%S')"
            echo "build_epoch=$(date --date="$datetime" -u +'%s')"
            echo "nodejs_version=$(grep "^nodejs\s" .tool-versions | cut -f2 -d' ')"
            echo "python_version=$(grep "^python\s" .tool-versions | cut -f2 -d' ')"
            echo "terraform_version=$(grep "^terraform\s" .tool-versions | cut -f2 -d' ')"
            # TODO: Get the version, but it may not be the .version file as this should come from the CI/CD Pull Request Workflow
            echo "version=$(head -n 1 .version 2> /dev/null || echo unknown)"
          } >> "$GITHUB_OUTPUT"
      - name: "List variables"
        run: |
          export BUILD_DATETIME="${{ steps.variables.outputs.build_datetime }}"
          export BUILD_TIMESTAMP="${{ steps.variables.outputs.build_timestamp }}"
          export BUILD_EPOCH="${{ steps.variables.outputs.build_epoch }}"
          export NODEJS_VERSION="${{ steps.variables.outputs.nodejs_version }}"
          export PYTHON_VERSION="${{ steps.variables.outputs.python_version }}"
          export TERRAFORM_VERSION="${{ steps.variables.outputs.terraform_version }}"
          export VERSION="${{ steps.variables.outputs.version }}"
          make list-variables

  deploy-bootstrap:
    name: "Deploy TF Core/Bootstrap"
    runs-on: ubuntu-latest
    needs: [metadata]
    environment: ${{ inputs.environment || 'poc' }}
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ./hometest-mgmt-terraform/infrastructure/environments/${{ inputs.environment || 'poc' }}/core/bootstrap
    permissions:
      id-token: write    # REQUIRED for OIDC token
      contents: read     # For checkout
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ env.DEPLOY_PATH }}

      - name: Deploy TF Core/Bootstrap
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          working_directory: ${{ env.DEPLOY_PATH }}

  deploy-network:
    name: "Deploy TF Core/Network"
    runs-on: ubuntu-latest
    needs: [deploy-bootstrap]
    environment: ${{ inputs.environment || 'poc' }}
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ./hometest-mgmt-terraform/infrastructure/environments/${{ inputs.environment || 'poc' }}/core/network
    permissions:
      id-token: write    # REQUIRED for OIDC token
      contents: read     # For checkout
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ env.DEPLOY_PATH }}

      - name: Deploy TF Core/Network
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          working_directory: ${{ env.DEPLOY_PATH }}

  deploy-shared-services:
    name: "Deploy TF Core/shared_services"
    runs-on: ubuntu-latest
    needs: [deploy-network]
    environment: ${{ inputs.environment || 'poc' }}
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ./hometest-mgmt-terraform/infrastructure/environments/${{ inputs.environment || 'poc' }}/core/shared_services
    permissions:
      id-token: write    # REQUIRED for OIDC token
      contents: read     # For checkout
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ env.DEPLOY_PATH }}

      - name: Deploy TF Core/shared_services
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          working_directory: ${{ env.DEPLOY_PATH }}

  deploy-aurora:
    name: "Deploy TF Core/aurora-postgres"
    runs-on: ubuntu-latest
    needs: [deploy-shared-services]
    environment: ${{ inputs.environment || 'poc' }}
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ./hometest-mgmt-terraform/infrastructure/environments/${{ inputs.environment || 'poc' }}/core/aurora-postgres
    permissions:
      id-token: write    # REQUIRED for OIDC token
      contents: read     # For checkout
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ env.DEPLOY_PATH }}

      - name: Deploy TF Core/aurora-postgres
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          working_directory: ${{ env.DEPLOY_PATH }}

  deploy-ecs:
    name: "Deploy TF Core/ECS"
    runs-on: ubuntu-latest
    needs: [deploy-aurora]
    if: ${{ (inputs.environment || 'poc') == 'poc' }}
    environment: ${{ inputs.environment || 'poc' }}
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ./hometest-mgmt-terraform/infrastructure/environments/poc/core/ecs
    permissions:
      id-token: write    # REQUIRED for OIDC token
      contents: read     # For checkout
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ env.DEPLOY_PATH }}

      - name: Deploy TF Core/ECS
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          working_directory: ${{ env.DEPLOY_PATH }}

  # ---------------------------------------------------------------------------
  # DEPLOY hometest-app/dev — runs after core infra (aurora depends on shared_services)
  # Triggered on every push to main and on the nightly schedule.
  # ---------------------------------------------------------------------------

  deploy-dev-migrator:
    name: "Deploy hometest-app/dev migrator"
    runs-on: ubuntu-latest
    needs: [deploy-aurora]
    environment: ${{ inputs.environment || 'poc' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: hometest-mgmt-terraform/infrastructure/environments/${{ inputs.environment || 'poc' }}/hometest-app/dev/lambda-goose-migrator

      - name: "Deploy goose migrator (dev)"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: hometest-mgmt-terraform/infrastructure/environments/${{ inputs.environment || 'poc' }}/hometest-app/dev/lambda-goose-migrator

  deploy-dev-app:
    name: "Deploy hometest-app/dev app"
    runs-on: ubuntu-latest
    needs: [deploy-dev-migrator]
    environment: ${{ inputs.environment || 'poc' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Checkout hometest-service"
        uses: actions/checkout@v6
        with:
          repository: "NHSDigital/hometest-service"
          ref: main
          path: hometest-service
          ssh-key: ${{ secrets.NHS_HOMETEST_SERVICE_DEPLOY_KEY_SSH_PRIV }}

      - name: "Restore mise hometest-service cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/share/mise
            hometest-service/.mise-cache
          key: mise-hometest-service-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/.mise.toml') }}
          restore-keys: |
            mise-hometest-service-${{ runner.os }}-mgmt-
            mise-hometest-service-${{ runner.os }}-

      - name: "Restore node_modules cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            hometest-service/node_modules
            hometest-service/ui/node_modules
            hometest-service/lambdas/node_modules
            hometest-service/tests/node_modules
          key: node-modules-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/**/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-mgmt-
            node-modules-${{ runner.os }}-

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: hometest-mgmt-terraform/infrastructure/environments/${{ inputs.environment || 'poc' }}/hometest-app/dev/app

      - name: "Deploy app (dev)"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: hometest-mgmt-terraform/infrastructure/environments/${{ inputs.environment || 'poc' }}/hometest-app/dev/app

      - name: "Save mise hometest-service cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.local/share/mise
            hometest-service/.mise-cache
          key: mise-hometest-service-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/.mise.toml') }}

      - name: "Save node_modules cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            hometest-service/node_modules
            hometest-service/ui/node_modules
            hometest-service/lambdas/node_modules
            hometest-service/tests/node_modules
          key: node-modules-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/**/package-lock.json') }}

      - name: "Post deployment summary"
        if: always()
        run: |
          {
            echo "## Deploy hometest-app/dev"
            echo "- **Status**: ${{ job.status }}"
            echo "- **Trigger**: ${{ github.event_name }}"
          } >> "$GITHUB_STEP_SUMMARY"
