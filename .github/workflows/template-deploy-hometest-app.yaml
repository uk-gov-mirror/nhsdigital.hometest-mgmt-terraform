---
name: "Deploy Terraform HomeTest App"
run-name: "Deploy account: ${{ inputs.account || 'poc' }}, env: ${{ inputs.env || 'dev' }}, tf: ${{ inputs.action || 'plan' }}"

on:
  workflow_call:
    inputs:
      hometest_service_ref:
        description: "Branch, tag, or SHA to checkout for hometest-service"
        required: false
        type: string
        default: "main"
      account:
        description: "Target AWS account (poc or dev)"
        required: true
        type: string
      env:
        description: "Target environment to deploy (dev, uat, demo, staging, dev-*)"
        required: true
        type: string
      action:
        description: "Terraform action: plan, apply, or destroy"
        required: true
        type: string
      targets:
        description: "Comma-separated list of resources to target in the app stack only. Leave empty for full deployment."
        required: false
        type: string
        default: ""
      skip_migrator:
        description: "Skip the goose migrator deployment entirely (deploy app stack only)."
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ROLE_ARN:
        required: true
      NHS_HOMETEST_SERVICE_DEPLOY_KEY_SSH_PRIV:
        required: true
      SLACK_WEBHOOK_URL:
        required: false

env:
  AWS_REGION: "eu-west-2"
  TF_INPUT: false
  TF_IN_AUTOMATION: true

jobs:
  validate-inputs:
    name: "Validate inputs"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      envs: ${{ steps.set-envs.outputs.envs }}
      working_dir_base: ${{ steps.set-envs.outputs.working_dir_base }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Checkout hometest-service"
        uses: actions/checkout@v6
        with:
          repository: "NHSDigital/hometest-service"
          ref: ${{ inputs.hometest_service_ref || 'main' }}
          path: hometest-service
          ssh-key: ${{ secrets.NHS_HOMETEST_SERVICE_DEPLOY_KEY_SSH_PRIV }}

      - name: "Set envs to deploy"
        id: set-envs
        env:
          INPUT_ACCOUNT: ${{ inputs.account || 'poc' }}
          INPUT_ENV: ${{ inputs.env || 'dev' }}
        run: |
          WORKING_DIR_BASE="hometest-mgmt-terraform/infrastructure/environments/${INPUT_ACCOUNT}/hometest-app"
          echo "working_dir_base=${WORKING_DIR_BASE}" >> "$GITHUB_OUTPUT"
          echo "envs=[\"${INPUT_ENV}\"]" >> "$GITHUB_OUTPUT"

      - name: "Validate env path exists"
        env:
          INPUT_ACCOUNT: ${{ inputs.account || 'poc' }}
          INPUT_ENV: ${{ inputs.env || 'dev' }}
        run: |
          BASE_PATH="hometest-mgmt-terraform/infrastructure/environments/${INPUT_ACCOUNT}/hometest-app"
          if [ "${INPUT_ENV}" != "all" ]; then
            if [ ! -d "${BASE_PATH}/${INPUT_ENV}" ]; then
              echo "::error::env path '${BASE_PATH}/${INPUT_ENV}' does not exist"
              exit 1
            fi
          fi

      - name: "Display deployment info"
        uses: ./hometest-mgmt-terraform/.github/actions/display-deployment-info
        with:
          hometest_service_path: hometest-service
          hometest_service_ref: ${{ inputs.hometest_service_ref || 'main' }}
          extra_rows: |
            | Account | ${{ inputs.account || 'poc' }} |
            | Stack | hometest-app |
            | Env(s) | ${{ inputs.env || 'dev' }} |
            | Action | ${{ inputs.action || 'plan' }} |
            | Targets | ${{ inputs.targets || 'all resources' }} |
            | Skip Migrator | ${{ inputs.skip_migrator || 'false' }} |

  # ---------------------------------------------------------------------------
  # DEPLOY PATH (plan / apply): deploy migrator (hooks auto-invoke) → deploy app
  # The Terragrunt after_hook on apply automatically invokes the Lambda to run
  # migrations — no separate invocation step needed.
  # ---------------------------------------------------------------------------

  deploy-migrator:
    name: "Migrate DB ${{ matrix.env }}"
    if: inputs.action != 'destroy' && inputs.skip_migrator != true
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    environment: ${{ inputs.account || 'poc' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        env: ${{ fromJson(needs.validate-inputs.outputs.envs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.env }}/lambda-goose-migrator

      - name: "Deploy goose migrator (${{ matrix.env }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.env }}/lambda-goose-migrator
          action: ${{ inputs.action || 'plan' }}

      - name: "Post migration summary"
        if: always()
        env:
          TARGET_ENV: ${{ matrix.env }}
          INPUT_ACTION: ${{ inputs.action || 'plan' }}
        run: |
          {
            echo "## Migrate DB: ${TARGET_ENV}"
            echo "- **Status**: ${{ job.status }}"
            echo "- **Action**: ${INPUT_ACTION}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-app:
    name: "Deploy App ${{ matrix.env }}"
    if: "!cancelled() && needs.validate-inputs.result == 'success' && inputs.action != 'destroy' && (needs.deploy-migrator.result == 'success' || inputs.skip_migrator == true)"
    runs-on: ubuntu-latest
    needs: [validate-inputs, deploy-migrator]
    environment: ${{ inputs.account || 'poc' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        env: ${{ fromJson(needs.validate-inputs.outputs.envs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Checkout hometest-service"
        uses: actions/checkout@v6
        with:
          repository: "NHSDigital/hometest-service"
          ref: ${{ inputs.hometest_service_ref || 'main' }}
          path: hometest-service
          ssh-key: ${{ secrets.NHS_HOMETEST_SERVICE_DEPLOY_KEY_SSH_PRIV }}

      - name: "Restore mise hometest-service cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/share/mise
            hometest-service/.mise-cache
          key: mise-hometest-service-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/.mise.toml') }}
          restore-keys: |
            mise-hometest-service-${{ runner.os }}-mgmt-
            mise-hometest-service-${{ runner.os }}-

      - name: "Restore pnpm store cache"
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-mgmt-
            pnpm-store-${{ runner.os }}-

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.env }}/app

      - name: "Deploy app (${{ matrix.env }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.env }}/app
          action: ${{ inputs.action || 'plan' }}
          targets: ${{ inputs.targets }}

      - name: "Save mise hometest-service cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.local/share/mise
            hometest-service/.mise-cache
          key: mise-hometest-service-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/.mise.toml') }}

      - name: "Save pnpm store cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-mgmt-${{ hashFiles('hometest-service/**/pnpm-lock.yaml') }}

      - name: "Post deployment summary"
        if: always()
        env:
          TARGET_ENV: ${{ matrix.env }}
          INPUT_ACTION: ${{ inputs.action || 'plan' }}
          WORKING_DIR_BASE: ${{ needs.validate-inputs.outputs.working_dir_base }}
        run: |
          {
            echo "## Deploy App: ${TARGET_ENV}"
            echo "- **Status**: ${{ job.status }}"
            echo "- **Action**: ${INPUT_ACTION}"
            echo "- **Path**: ${WORKING_DIR_BASE}/${TARGET_ENV}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # DESTROY PATH: destroy app → destroy migrator (before_hook auto-teardowns schema)
  # The Terragrunt before_hook on destroy automatically invokes the Lambda to
  # teardown the schema/user before destroying the migrator infrastructure.
  # ---------------------------------------------------------------------------

  destroy-app:
    name: "Destroy App ${{ matrix.env }}"
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    environment: ${{ inputs.account || 'poc' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        env: ${{ fromJson(needs.validate-inputs.outputs.envs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Checkout hometest-service"
        uses: actions/checkout@v6
        with:
          repository: "NHSDigital/hometest-service"
          ref: ${{ inputs.hometest_service_ref || 'main' }}
          path: hometest-service
          ssh-key: ${{ secrets.NHS_HOMETEST_SERVICE_DEPLOY_KEY_SSH_PRIV }}

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.env }}/app

      - name: "Destroy app (${{ matrix.env }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.env }}/app
          action: destroy
          targets: ${{ inputs.targets }}

      - name: "Post destroy summary"
        if: always()
        env:
          TARGET_ENV: ${{ matrix.env }}
        run: |
          {
            echo "## Destroy App: ${TARGET_ENV}"
            echo "- **Status**: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  destroy-migrator:
    name: "Destroy Migrator ${{ matrix.env }}"
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    needs: [validate-inputs, destroy-app]
    environment: ${{ inputs.account || 'poc' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        env: ${{ fromJson(needs.validate-inputs.outputs.envs) }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: Install mise tools
        uses: ./hometest-mgmt-terraform/.github/actions/install-mise
        with:
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.env }}/lambda-goose-migrator

      - name: "Destroy goose migrator (${{ matrix.env }})"
        uses: ./hometest-mgmt-terraform/.github/actions/deploy-terragrunt
        with:
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ env.AWS_REGION }}
          working_directory: ${{ needs.validate-inputs.outputs.working_dir_base }}/${{ matrix.env }}/lambda-goose-migrator
          action: destroy

      - name: "Post destroy migrator summary"
        if: always()
        env:
          TARGET_ENV: ${{ matrix.env }}
        run: |
          {
            echo "## Destroy Migrator: ${TARGET_ENV}"
            echo "- **Status**: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # SUMMARY
  # ---------------------------------------------------------------------------

  summary:
    name: "Deployment Summary"
    runs-on: ubuntu-latest
    needs: [validate-inputs, deploy-migrator, deploy-app, destroy-app, destroy-migrator]
    if: always()
    steps:
      - name: "Generate summary"
        env:
          INPUT_ACCOUNT: ${{ inputs.account || 'poc' }}
          INPUT_ENV: ${{ inputs.env || 'dev' }}
          INPUT_ACTION: ${{ inputs.action || 'plan' }}
          INPUT_TARGETS: ${{ inputs.targets || 'all resources' }}
          INPUT_SKIP_MIGRATOR: ${{ inputs.skip_migrator || 'false' }}
        run: |
          {
            echo "## Deployment Complete"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| Account | ${INPUT_ACCOUNT} |"
            echo "| Stack | hometest-app |"
            echo "| Env(s) | ${INPUT_ENV} |"
            echo "| Action | ${INPUT_ACTION} |"
            echo "| Targets | ${INPUT_TARGETS} |"
            echo "| Skip Migrator | ${INPUT_SKIP_MIGRATOR} |"
            echo "| Overall Status | see individual jobs |"
            echo "| Run ID | ${GITHUB_RUN_ID} |"
            echo "| Triggered by | ${GITHUB_ACTOR} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          path: hometest-mgmt-terraform

      - name: "Determine overall status"
        id: status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "result=cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

      - name: "Notify Slack on failure"
        if: inputs.action != 'plan' && steps.status.outputs.result == 'failure'
        uses: ./hometest-mgmt-terraform/.github/actions/notify-slack
        with:
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure
          environment: "${{ inputs.account || 'poc' }}/${{ inputs.env || 'dev' }}"
          module: "hometest-app (${{ inputs.action || 'plan' }})"
