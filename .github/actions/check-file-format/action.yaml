---
name: "Check file format"
description: "Check file format"
runs:
  using: "composite"
  steps:
    - name: "Check file format"
      shell: bash
      env:
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      run: |
        export BRANCH_NAME=origin/$DEFAULT_BRANCH
        check=branch ./scripts/githooks/check-file-format.sh
