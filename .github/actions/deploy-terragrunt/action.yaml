---
name: "Deploy Terragrunt Module"
description: "Configure AWS credentials, install mise, and run Terragrunt init/plan/apply"

inputs:
  aws_role_arn:
    description: "AWS IAM Role ARN for OIDC authentication"
    required: true
  aws_region:
    description: "AWS Region"
    required: false
    default: "eu-west-2"
  working_directory:
    description: "Working directory containing the Terragrunt configuration"
    required: true
  action:
    description: "Terragrunt action: plan, apply, destroy-plan, destroy"
    required: false
    default: "apply"
  lock_enabled:
    description: "Whether to enable state locking (default: true)"
    required: false
    default: "true"
  targets:
    description: "Comma-separated list of resources to target (e.g., module.lambdas[\"order-status-lambda\"],aws_lambda_permission.api_gateway[\"order-status-lambda\"]). Leave empty to apply to all resources."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}

    - name: "Determine repo root"
      id: repo-root
      shell: bash
      run: |
        REPO_ROOT=$(git -C "$GITHUB_ACTION_PATH" rev-parse --show-toplevel)
        echo "path=${REPO_ROOT}" >> "$GITHUB_OUTPUT"

    - name: "Build target flags"
      id: target-flags
      shell: bash
      env:
        TARGETS: ${{ inputs.targets }}
      run: |
        if [[ -n "$TARGETS" ]]; then
          # Convert comma-separated targets to -target flags
          TARGET_FLAGS=""
          IFS=',' read -ra TARGET_ARRAY <<< "$TARGETS"
          for target in "${TARGET_ARRAY[@]}"; do
            # Trim whitespace
            target=$(echo "$target" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            if [[ -n "$target" ]]; then
              TARGET_FLAGS="${TARGET_FLAGS} -target='${target}'"
            fi
          done
          echo "flags=${TARGET_FLAGS}" >> "$GITHUB_OUTPUT"
          echo "Targeting specific resources: ${TARGET_FLAGS}"
        else
          echo "flags=" >> "$GITHUB_OUTPUT"
          echo "No targets specified - will apply to all resources"
        fi

    - name: Cache terraform providers
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/terraform
          ${{ steps.repo-root.outputs.path }}/.terraform-plugin-cache
        key: terraform-${{ runner.os }}-mgmt-${{ github.event_name == 'pull_request' && 'pr' || 'push' }}-${{ hashFiles(format('{0}/**/providers.tf', steps.repo-root.outputs.path)) }}
        restore-keys: |
          terraform-${{ runner.os }}-mgmt-${{ github.event_name == 'pull_request' && 'pr' || 'push' }}-
          terraform-${{ runner.os }}-mgmt-
          terraform-${{ runner.os }}-

    - name: "Create summary helper"
      shell: bash
      run: |
        cat > /tmp/write-tg-summary.sh << 'HELPER'
        #!/usr/bin/env bash
        # Usage: source write-tg-summary.sh <heading> <grep_pattern> <output_file> <working_dir>
        _heading="$1"; _pattern="$2"; _file="$3"; _wdir="$4"
        _summary=$(grep -E "$_pattern" "$_file" 2>/dev/null | tail -1 | sed -e 's/\x1b\[[0-9;]*m//g' -e 's/^[0-9:.]*[[:space:]]*STDOUT[[:space:]]*terraform:[[:space:]]*//' || true)
        if [[ -n "$_summary" ]]; then
        echo "### ${_heading} — \`${_wdir}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
        echo "$_summary" >> "$GITHUB_STEP_SUMMARY"
        echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
        fi
        HELPER
        sed -i 's/^        //' /tmp/write-tg-summary.sh

    - name: Terragrunt Init
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      run: mise exec -- terragrunt init

    - name: Terragrunt Plan
      if: inputs.action == 'plan' || inputs.action == 'apply'
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      env:
        LOCK_FLAG: ${{ inputs.lock_enabled == 'false' && '-lock=false' || '' }}
        TARGET_FLAGS: ${{ steps.target-flags.outputs.flags }}
        WORKING_DIR: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        mise exec -- terragrunt plan -out=tfplan $LOCK_FLAG $TARGET_FLAGS 2>&1 | tee /tmp/tg-plan-output.txt
        TG_EXIT=${PIPESTATUS[0]}
        source /tmp/write-tg-summary.sh "Terragrunt Plan" 'Plan:|No changes\.' /tmp/tg-plan-output.txt "$WORKING_DIR"
        exit "$TG_EXIT"

    - name: Terragrunt Destroy Plan
      if: inputs.action == 'destroy-plan'
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      env:
        TARGET_FLAGS: ${{ steps.target-flags.outputs.flags }}
        WORKING_DIR: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        mise exec -- terragrunt plan -destroy -out=tfplan $TARGET_FLAGS 2>&1 | tee /tmp/tg-plan-output.txt
        TG_EXIT=${PIPESTATUS[0]}
        source /tmp/write-tg-summary.sh "Terragrunt Destroy Plan" 'Plan:|No changes\.' /tmp/tg-plan-output.txt "$WORKING_DIR"
        exit "$TG_EXIT"

    - name: Terragrunt Apply
      if: inputs.action == 'apply'
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      env:
        WORKING_DIR: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        mise exec -- terragrunt apply -auto-approve tfplan 2>&1 | tee /tmp/tg-apply-output.txt
        TG_EXIT=${PIPESTATUS[0]}
        source /tmp/write-tg-summary.sh "Terragrunt Apply" 'Apply complete!|No changes\.' /tmp/tg-apply-output.txt "$WORKING_DIR"
        exit "$TG_EXIT"

    - name: Terragrunt Destroy
      if: inputs.action == 'destroy'
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      env:
        TARGET_FLAGS: ${{ steps.target-flags.outputs.flags }}
        WORKING_DIR: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        mise exec -- terragrunt destroy -auto-approve $TARGET_FLAGS 2>&1 | tee /tmp/tg-destroy-output.txt
        TG_EXIT=${PIPESTATUS[0]}
        source /tmp/write-tg-summary.sh "Terragrunt Destroy" 'Destroy complete!|No changes\.' /tmp/tg-destroy-output.txt "$WORKING_DIR"
        exit "$TG_EXIT"
