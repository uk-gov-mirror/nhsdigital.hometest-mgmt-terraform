---
name: "Invoke Goose Migrator Lambda"
description: "Configure AWS credentials, invoke the goose migrator Lambda, and stream CloudWatch logs"

inputs:
  aws_role_arn:
    description: "AWS IAM Role ARN for OIDC authentication"
    required: true
  aws_region:
    description: "AWS Region"
    required: false
    default: "eu-west-2"
  working_directory:
    description: "Terragrunt working directory to read 'function_name' output from"
    required: true
  lambda_action:
    description: "Action payload to send to the Lambda (migrate or teardown)"
    required: false
    default: "migrate"
  subenv:
    description: "Sub-environment label used in the job summary"
    required: true
  function_required:
    description: "Whether a missing function name is a hard error (true) or a warning that skips execution (false)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: "Configure AWS credentials"
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}

    - name: "Invoke Lambda and stream CloudWatch logs"
      shell: bash
      run: |
        WORKING_DIR="${{ inputs.working_directory }}"

        # Get function name from terraform output
        FUNCTION_NAME=$(cd "$WORKING_DIR" && mise exec -- terragrunt output -raw function_name 2>/dev/null || echo "")

        if [ -z "$FUNCTION_NAME" ] || [ "$FUNCTION_NAME" == "None" ]; then
          if [ "${{ inputs.function_required }}" == "false" ]; then
            echo "::warning::Could not determine Lambda function name — migrator may already be destroyed. Skipping."
            exit 0
          else
            echo "::error::Could not determine Lambda function name from terraform outputs"
            exit 1
          fi
        fi

        echo "Invoking Lambda: ${FUNCTION_NAME} (action: ${{ inputs.lambda_action }})"
        LOG_GROUP="/aws/lambda/${FUNCTION_NAME}"
        START_TIME_MS=$(date +%s%3N)

        aws lambda invoke \
          --function-name "$FUNCTION_NAME" \
          --invocation-type RequestResponse \
          --log-type Tail \
          --cli-read-timeout 0 \
          --cli-binary-format raw-in-base64-out \
          --payload "{\"action\":\"${{ inputs.lambda_action }}\"}" \
          /tmp/lambda-response.json > /tmp/lambda-invoke-meta.json

        STATUS_CODE=$(jq -r '.StatusCode // empty' /tmp/lambda-invoke-meta.json)
        FUNCTION_ERROR=$(jq -r '.FunctionError // empty' /tmp/lambda-invoke-meta.json)
        LOG_RESULT_B64=$(jq -r '.LogResult // empty' /tmp/lambda-invoke-meta.json)

        echo "Status code: ${STATUS_CODE}"

        LOG_TAIL=""
        REQUEST_ID=""
        if [ -n "$LOG_RESULT_B64" ]; then
          LOG_TAIL=$(echo "$LOG_RESULT_B64" | base64 -d)
          REQUEST_ID=$(echo "$LOG_TAIL" | grep -oP 'START RequestId: \K[a-f0-9-]+' || true)
        fi
        echo "Request ID: ${REQUEST_ID}"

        # Fetch CloudWatch logs
        LOGS=""
        if [ -n "$REQUEST_ID" ]; then
          echo "Waiting for CloudWatch to ingest logs..."
          sleep 10
          MAX_WAIT=120; ELAPSED=0; INTERVAL=5; LOG_STREAM=""
          while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
            FILTER_RESULT=$(aws logs filter-log-events \
              --log-group-name "$LOG_GROUP" \
              --filter-pattern "\"END RequestId: ${REQUEST_ID}\"" \
              --start-time "$START_TIME_MS" \
              --query "events[0]" --output json 2>/dev/null || echo "null")
            LOG_STREAM=$(echo "$FILTER_RESULT" | jq -r '.logStreamName // empty')
            if [ -n "$LOG_STREAM" ]; then break; fi
            echo "  Waiting for END marker... (${ELAPSED}s elapsed)"
            sleep "$INTERVAL"; ELAPSED=$(( ELAPSED + INTERVAL ))
          done

          if [ -n "$LOG_STREAM" ]; then
            LOGS=$(aws logs get-log-events \
              --log-group-name "$LOG_GROUP" --log-stream-name "$LOG_STREAM" \
              --start-time "$START_TIME_MS" --start-from-head \
              --query "events[*].message" --output text 2>/dev/null || true)
          fi
        fi

        SUMMARY_TITLE="${{ inputs.lambda_action == 'migrate' && 'Migration' || 'Teardown' }} Logs (${{ inputs.subenv }})"
        echo "=== ${SUMMARY_TITLE} ==="
        if [ -n "$LOGS" ]; then
          echo "$LOGS"
          {
            echo "### ${SUMMARY_TITLE}"
            echo "**Function**: \`${FUNCTION_NAME}\`"
            echo "**Request ID**: \`${REQUEST_ID}\`"
            echo '```'; echo "$LOGS"; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        else
          echo "$LOG_TAIL"
          {
            echo "### ${SUMMARY_TITLE} (tail)"
            echo "**Function**: \`${FUNCTION_NAME}\`"
            echo '```'; echo "$LOG_TAIL"; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ -n "$FUNCTION_ERROR" ] && [ "$FUNCTION_ERROR" != "null" ]; then
          echo "::error::Lambda ${{ inputs.lambda_action }} error: ${FUNCTION_ERROR}"
          cat /tmp/lambda-response.json
          exit 1
        fi
